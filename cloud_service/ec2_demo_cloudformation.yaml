AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Plantilla simple para una demo del cloud_service (public-backend + private-ml)
  sobre una unica instancia EC2 con Docker, Docker Compose y Nginx como reverse
  proxy. No usa Route 53 ni ECS. Pensada para pocos usuarios (<= 3 concurrentes).

Parameters:
  EnvironmentName:
    Type: String
    Default: mfa-demo

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Nombre del par de llaves EC2 existente para acceso SSH.

  InstanceType:
    Type: String
    Default: t3.large
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - c5.large
      - c5.xlarge
    Description: >
      Tamano de la instancia. Para que la inferencia LSTM/TFLite no sea lenta se
      recomienda t3.large (2 vCPU / 8 GB) o c5.xlarge (4 vCPU / 8 GB) si la
      exposicion necesita respuestas mas rapidas.

  SSHLocation:
    Type: String
    Default: 0.0.0.0/0
    Description: >
      CIDR autorizado para SSH (puerto 22). Por seguridad reemplaza por TU_IP/32.
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'

  RepoUrl:
    Type: String
    Default: https://github.com/AxelLoayza/MFA_proyect_validate.git
    Description: URL del repositorio git a clonar en la instancia.

  VpcCidr:
    Type: String
    Default: 10.50.0.0/16

  PublicSubnetCidr:
    Type: String
    Default: 10.50.0.0/24

  RootVolumeSizeGb:
    Type: Number
    Default: 30
    Description: Tamano del disco raiz en GB (imagenes Docker + modelo).

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: AMI de Amazon Linux 2023 (resuelta automaticamente, no editar).

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-igw

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetCidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-rt

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Demo EC2 security group (SSH + HTTP + HTTPS)
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
          Description: SSH
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (Nginx reverse proxy)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS (opcional, certbot Lets Encrypt)
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-sg

  DemoEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  DemoInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref RootVolumeSizeGb
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-instance
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf update -y
          dnf install -y git dnf-plugins-core
          # Docker CE oficial (incluye docker-buildx-plugin y docker-compose-plugin)
          dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
          dnf install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          systemctl enable --now docker
          usermod -aG docker ec2-user
          # Clonar solo cloud_service para reducir peso y tiempo de despliegue
          sudo -u ec2-user bash -c 'if [ ! -d /home/ec2-user/app/.git ]; then git clone --depth 1 --filter=blob:none --sparse ${RepoUrl} /home/ec2-user/app; fi'
          sudo -u ec2-user bash -c 'cd /home/ec2-user/app && git sparse-checkout set cloud_service && git checkout main'
          echo "EC2 lista. Continua con la guia EC2_DEMO_GUIA.md para crear los .env y levantar docker compose."

  DemoEipAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt DemoEip.AllocationId
      InstanceId: !Ref DemoInstance

Outputs:
  PublicIp:
    Description: IP publica fija (Elastic IP). Usala para el A record de DuckDNS.
    Value: !Ref DemoEip

  InstanceId:
    Value: !Ref DemoInstance

  SshCommand:
    Description: Comando SSH de ejemplo.
    Value: !Sub ssh -i TU_LLAVE.pem ec2-user@${DemoEip}

  AppHttpUrl:
    Description: URL HTTP de la demo (a traves de Nginx en el puerto 80).
    Value: !Sub http://${DemoEip}
