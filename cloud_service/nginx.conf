# HTTP: solo challenge de certbot + redirect a HTTPS
server {
    listen 80;
    server_name biometriclabs.duckdns.org;

    # ACME challenge para certbot webroot (renovacion automatica)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demas redirige a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: trafico real
server {
    listen 443 ssl;
    server_name biometriclabs.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/biometriclabs.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biometriclabs.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Tamano maximo de payload (firmas biometricas)
    client_max_body_size 2m;

    # Healthcheck directo del backend
    location = /health {
        proxy_pass http://public-backend:4003/health;
    }

    location ^~ /auth/ {
        proxy_pass http://public-backend:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /tenants/ {
        proxy_pass http://public-backend:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ^~ /invites/ {
        proxy_pass http://public-backend:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # La raiz publica sirve el frontend React
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # Permite que el popup de Google OAuth devuelva el token via postMessage
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    }
}
